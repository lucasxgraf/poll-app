@if (toastService.toast(); as state) {
  <div class="toast" [class.toast--visible]="state.visible">
    <span class="toast__message">{{ state.message }}</span>
    <button class="toast__close" (click)="toastService.hide()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
}
