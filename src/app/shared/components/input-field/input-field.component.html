<div class="input-field" [class.input-field--error]="showError">
  @if (label()) {
    <label [for]="id()" class="input-field__label">
      {{ label() }}
    </label>
  }

  <div class="input-field__layout">
    <div class="input-field__wrapper">
      <input 
        [id]="id()"
        [name]="id()"
        [type]="type()" 
        [formControl]="control()" 
        [placeholder]="placeholder()"
        class="input-field__control">
    </div>
    
    <div class="input-field__action">
      <ng-content select="[action]"></ng-content>
    </div>
  </div>

  <div class="input-field__error-area">
    @if (showError) {
      <span class="input-field__error-text">
        @if (control().errors?.['required']) { Required field }
        @if (control().errors?.['email']) { Invalid email }
        @if (control().errors?.['minlength']) { Too short (min 6) }
      </span>
    }
  </div>
</div>
