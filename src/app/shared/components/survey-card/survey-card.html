<article class="survey-card" [class.survey-card--highlight]="variant() === 'highlight'" [class.survey-card--list]="variant() === 'list'">
  <div class="survey-card__body">
    <span class="survey-card__category">{{ survey().category }}</span>
    <h3 class="survey-card__title">{{ survey().title }}</h3>
  </div>

  <footer class="survey-card__footer">
    <app-badge variant="secondary">{{ remainingTime() }}</app-badge>
  </footer>
</article>
