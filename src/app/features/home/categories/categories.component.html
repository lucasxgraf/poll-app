<section class="categories">
  <div class="container">
    
    <div class="categories__controls">
      <div class="categories__filter">
        <app-button 
          [variant]="currentFilter() === 'active' ? 'primary' : 'filter'" 
          (click)="setFilter('active')">
          Active survey
        </app-button>
        
        <app-button 
          [variant]="currentFilter() === 'past' ? 'primary' : 'filter'" 
          (click)="setFilter('past')">
          Past survey
        </app-button>
      </div>

      <div class="categories__sort">
        <div class="categories__dropdown" #dropdownWrapper>
          <app-button variant="tertiary" (click)="toggleDropdown()">
            {{ selectedCategory() }}
            <svg class="categories__dropdown-icon" [class.categories__dropdown-icon--open]="isDropdownOpen()" width="16" height="16" viewBox="0 0 15 8" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M6.5843 7.61702L0.261628 1.44681C0.174419 1.3617 0.109012 1.2695 0.065407 1.17021C0.0218023 1.07092 0 0.964539 0 0.851064C0 0.624114 0.0799419 0.425532 0.239826 0.255319C0.399709 0.0851064 0.610465 0 0.872093 0H14.1279C14.3895 0 14.6003 0.0851064 14.7602 0.255319C14.9201 0.425532 15 0.624114 15 0.851064C15 0.907802 14.9128 1.10638 14.7384 1.44681L8.4157 7.61702C8.27035 7.75887 8.125 7.85816 7.97965 7.91489C7.8343 7.97163 7.67442 8 7.5 8C7.32558 8 7.1657 7.97163 7.02035 7.91489C6.875 7.85816 6.72965 7.75887 6.5843 7.61702Z" 
              fill="currentColor"/>
            </svg>
          </app-button>

          @if (isDropdownOpen()) {
            <ul class="categories__dropdown-menu">
              @for (category of categoryOptions(); track category) {
                <li class="categories__dropdown-item" (click)="selectCategory(category)">
                  {{ category }}
                </li>
              }
            </ul>
          }
        </div>
      </div>
    </div>

    <div class="categories__grid">
      @for (item of filteredSurveys(); track item.id) {
        <app-survey-card 
          [survey]="item"
          [routerLink]="['/survey', item.id]"
          variant="list">
        </app-survey-card>
      } @empty {
        <div class="categories__empty-state">
          <p>Currently there are no surveys in this category.</p>
        </div>
      }
    </div>

  </div>
</section>
