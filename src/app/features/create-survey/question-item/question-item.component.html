      </svg>
    </button>
  </div>

  <app-input-field
    [id]="'question-text-' + index()"
    placeholder="Enter your question"
    [control]="$any(questionGroup.get('question_text'))">
  </app-input-field>

  <div class="answers">
    <div class="answers__header">
      <h3>Answers</h3>
      
      <label class="checkbox-wrapper">
        <input type="checkbox" formControlName="allow_multiple">
        <span class="checkbox-wrapper__visual"></span>
        <span class="checkbox-wrapper__text">Allow multiple answers</span>
      </label>
    </div>

    <div formArrayName="options">
      @for (option of optionsArray.controls; track option; let oIdx = $index) {
        <div class="option-row">
          <span class="option-row__letter">{{ ['A','B','C','D','E','F'][oIdx] }}.</span>
          
          <app-input-field
            [id]="'q-' + index() + '-o-' + oIdx"
            [control]="getOptionControl(oIdx)"
            placeholder="Enter your answer option">
            <button action type="button" class="question-item__icon-btn" (click)="removeOption(oIdx)">
              <svg width="26" height="26" viewBox="0 0 26 26" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.25 22.75C6.65417 22.75 6.1441 22.5378 5.71979 22.1135C5.29549 21.6892 5.08333 21.1792 5.08333 20.5833V6.5C4.77639 6.5 4.5191 6.39618 4.31146 6.18854C4.10382 5.9809 4 5.72361 4 5.41667C4 5.10972 4.10382 4.85243 4.31146 4.64479C4.5191 4.43715 4.77639 4.33333 5.08333 4.33333H9.41667C9.41667 4.02639 9.52049 3.7691 9.72813 3.56146C9.93576 3.35382 10.1931 3.25 10.5 3.25H14.8333C15.1403 3.25 15.3976 3.35382 15.6052 3.56146C15.8128 3.7691 15.9167 4.02639 15.9167 4.33333H20.25C20.5569 4.33333 20.8142 4.43715 21.0219 4.64479C21.2295 4.85243 21.3333 5.10972 21.3333 5.41667C21.3333 5.72361 21.2295 5.9809 21.0219 6.18854C20.8142 6.39618 20.5569 6.5 20.25 6.5V20.5833C20.25 21.1792 20.0378 21.6892 19.6135 22.1135C19.1892 22.5378 18.6792 22.75 18.0833 22.75H7.25ZM18.0833 6.5H7.25V20.5833H18.0833V6.5ZM10.5 18.4167C10.8069 18.4167 11.0642 18.3128 11.2719 18.1052C11.4795 17.8976 11.5833 17.6403 11.5833 17.3333V9.75C11.5833 9.44306 11.4795 9.18576 11.2719 8.97813C11.0642 8.77049 10.8069 8.66667 10.5 8.66667C10.1931 8.66667 9.93576 8.77049 9.72813 8.97813C9.52049 9.18576 9.41667 9.44306 9.41667 9.75V17.3333C9.41667 17.6403 9.52049 17.8976 9.72813 18.1052C9.93576 18.3128 10.1931 18.4167 10.5 18.4167ZM14.8333 18.4167C15.1403 18.4167 15.3976 18.3128 15.6052 18.1052C15.8128 17.8976 15.9167 17.6403 15.9167 17.3333V9.75C15.9167 9.44306 15.8128 9.18576 15.6052 8.97813C15.3976 8.77049 15.1403 8.66667 14.8333 8.66667C14.5264 8.66667 14.2691 8.77049 14.0615 8.97813C13.8538 9.18576 13.75 9.44306 13.75 9.75V17.3333C13.75 17.6403 13.8538 17.8976 14.0615 18.1052C14.2691 18.3128 14.5264 18.4167 14.8333 18.4167Z" 
                fill="currentColor"/>
              </svg>
            </button>
          </app-input-field>
        </div>
      }
    </div>

    <app-button variant="tertiary" type="button" class="add-answer-btn" (click)="addOption()">
      Add answer
