<div class="survey-data" [formGroup]="parentForm">
  <div class="survey-data__main">
    <app-input-field
      id="survey-title"
      label="Survey name"
      placeholder="e.g. Team Event Planning"
      [control]="$any(parentForm.controls['title'])">
      <button action type="button" class="survey-data__icon-btn">
        <img src="assets/svg/delete.svg" alt="Trash icon"> 
      </button>
    </app-input-field>

    <div class="survey-data__row">
      <app-input-field
        id="survey-date"
        label="Set end date (optional)"
        type="date"
        [control]="$any(parentForm.controls['expires_at'])">
      </app-input-field>

      <div class="survey-data__field">
        <div class="dropdown">
          <!-- Button-Trigger -->
          <app-button variant="tertiary" (click)="toggleDropdown()">
            {{ selectedCategory() }}
            <img src="assets/svg/arrow_drop_down.svg" 
                 alt="icon dropdown" 
                 class="dropdown__icon" 
                 [class.dropdown__icon--open]="isDropdownOpen()">
          </app-button>

          <!-- Absolut positioniertes Menü (verhindert UI-Sprünge) -->
          @if (isDropdownOpen()) {
            <ul class="dropdown__menu">
              @for (category of categoryOptions(); track category) {
                <li class="dropdown__item" (click)="selectCategory(category)">
                  {{ category }}
                </li>
              }
            </ul>
          }
        </div>
      </div>
    </div>
  </div>
  
  <div class="survey-data__description">
    <label for="survey-desc" class="survey-data__label">Describing text (optional)</label>
    <textarea id="survey-desc" formControlName="description" class="survey-data__textarea" placeholder="Optional description..."></textarea>
  </div>
</div>
